# Component profiles — plate items for meal-repair logic.
# Separate from ingredient trees: a profile says what an item BRINGS to a plate
# and what it tends to LACK, so the meal-repair engine can balance a whole plate
# without needing a full technique tree for every food.
#
# Schema:
#   provides        roles this item brings (newline-separated)
#   flavour / texture tags
#   missing_risks   roles this plate item tends to lack (newline-separated)
#   heaviness_score 0-5 subjective richness
#   dryness_score   0-5 subjective dryness
# cream counts as fat; mild_base counts as body in the meal-repair canon.

component_profiles:
  - name: mashed_potatoes
    aliases: "mash\nmashed potato"
    provides: "carb\ncream\nbody\nsalt\nmild_base"
    flavour: "mild\ncreamy\nbuttery"
    texture: "soft\nsmooth"
    missing_risks: "acid\nherb\ncrunch"
    heaviness_score: 4
    dryness_score: 1
    notes: "rich + soft + mild — needs acid, crunch, freshness"

  - name: boiled_potatoes
