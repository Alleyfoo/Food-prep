  - { name: tomato_salsa_component,            kind: fresh,        keeps_well: short,  freezes_well: 0, batch_prep_value: medium }
  - { name: roasted_tomato_component,          kind: cooked,       keeps_well: medium, freezes_well: 1, batch_prep_value: high }
  - { name: charred_tomato_component,          kind: cooked,       keeps_well: medium, freezes_well: 1, batch_prep_value: high }
  - { name: tomato_sauce_base,                 kind: cooked,       keeps_well: medium, freezes_well: 1, batch_prep_value: very_high }
