# ---- Ingredients -----------------------------------------------------------
# `kind` guards the ontology hedgerow:
#   full   = deserves a technique tree (tomato, onion, potato, ...)
#   filler = fills a role, no tree needed (most pantry items)
#   both   = has a tree AND appears as a filler (potato: tree + mild_base filler)
ingredients:
  - canonical_name: tomato
    aliases: "tomatoes\ntomaatti"
    base_roles: "acid\njuicy_component"
    default_availability_class: very_common
    kind: full
    availability:
      - { region_code: FI, availability_class: very_common, seasonality_note: "Finnish greenhouse July-Sep; imported year-round" }

  - { canonical_name: olive_oil,  base_roles: "fat",        default_availability_class: very_common }
  - { canonical_name: basil,      base_roles: "herb",       default_availability_class: common }
  - { canonical_name: parsley,    base_roles: "herb",       default_availability_class: common }
  - { canonical_name: cilantro,   base_roles: "herb",       default_availability_class: occasional }
  - { canonical_name: thyme,      base_roles: "herb",       default_availability_class: common }
  - { canonical_name: garlic,     base_roles: "aromatic",   default_availability_class: very_common }
  - { canonical_name: onion,      base_roles: "aromatic",   default_availability_class: very_common, kind: full }
  - { canonical_name: mozzarella, base_roles: "fat\nprotein", default_availability_class: common }
  - { canonical_name: parmesan,   base_roles: "umami\nfat", default_availability_class: common }
  - { canonical_name: soft_cheese, aliases: "ricotta\nfeta", base_roles: "fat\nprotein", default_availability_class: common }
  - { canonical_name: bread,      base_roles: "carb\ncrunch", default_availability_class: very_common }
  - { canonical_name: croutons,   base_roles: "crunch\ncarb", default_availability_class: common }
  - { canonical_name: pasta,      base_roles: "carb",       default_availability_class: very_common }
  - { canonical_name: rice,       base_roles: "carb",       default_availability_class: very_common }
  - { canonical_name: tortilla,   base_roles: "carb\ncarrier", default_availability_class: occasional }
  - { canonical_name: lime,       base_roles: "acid",       default_availability_class: common }
  - canonical_name: lemon
    base_roles: "acid"
    default_availability_class: very_common
    repairs: "heavy\nfatty\nroasted\nfried\ngrilled\nfish\nlegume\npotato\nsweet\nbland"
    avoid_when: "already_high_acid\ndairy_long_cook\ndelicate_raw"
  - canonical_name: vinegar
    base_roles: "acid"
    default_availability_class: very_common
    repairs: "heavy\nfatty\nroasted\nfried\nsweet\nlegume\npotato\nbland"
    avoid_when: "already_high_acid\ndelicate\ndairy_long_cook\nraw_fish_overpower"
  - { canonical_name: jalapeno,   base_roles: "heat",       default_availability_class: occasional }
  - { canonical_name: chile_flakes, aliases: "chilli flakes\nred pepper flakes", base_roles: "heat", default_availability_class: very_common }
  - canonical_name: cream
    base_roles: "cream\nfat"
    default_availability_class: common
    repairs: "spicy\ndry\nroasted\nsharp_acid\nsoup\nbland"
    avoid_when: "already_heavy\nalready_rich\ndairy_long_cook_high_acid\nfried"
  - canonical_name: yogurt
    base_roles: "cream\nprotein"
    default_availability_class: very_common
    repairs: "spicy\nfried\nroasted\nheavy\nbland\nsoup"
    avoid_when: "high_heat_boil\nalready_high_acid\ndairy_free"
  - { canonical_name: eggs,       base_roles: "protein",    default_availability_class: very_common }
  - { canonical_name: cucumber,   base_roles: "crunch\nhydration", default_availability_class: very_common }
  - { canonical_name: capers,     base_roles: "acid\numami", default_availability_class: occasional }
  - { canonical_name: olives,     base_roles: "salt\numami", default_availability_class: common }
  - { canonical_name: white_beans, aliases: "cannellini\nharicot", base_roles: "protein\ncarb", default_availability_class: common }
  - { canonical_name: potato,     base_roles: "carb\nmild_base", default_availability_class: very_common, kind: both, aliases: "potatoes\nperuna" }
  - canonical_name: cabbage
    aliases: "cabbage\nkaali\nsavoy\nred cabbage\ngreen cabbage"
    base_roles: "crunch"
    default_availability_class: very_common
    kind: full
    availability:
      - { region_code: FI, availability_class: very_common, seasonality_note: "Finnish-grown summer-autumn; stored winter; imported year-round" }
  - { canonical_name: avocado,    base_roles: "fat",        default_availability_class: occasional }
  - { canonical_name: greens,     aliases: "lettuce\nspinach", base_roles: "herb\nmild_base", default_availability_class: very_common }
  - { canonical_name: stock,      base_roles: "body\numami", default_availability_class: common }
  - canonical_name: butter
    base_roles: "fat"
    default_availability_class: very_common
    repairs: "dry\nbland\nroasted\nsaute_base\nsauce_body"
    avoid_when: "already_heavy\nhigh_heat_frying\ndairy_free"
  - { canonical_name: black_pepper, aliases: "pepper", base_roles: "aromatic", default_availability_class: very_common }
  - { canonical_name: sea_salt,   aliases: "salt\nflaky salt", base_roles: "salt", default_availability_class: very_common }
  - { canonical_name: grilled_fish, base_roles: "protein",  default_availability_class: occasional }
  - { canonical_name: tofu,       base_roles: "protein",    default_availability_class: common }
  - { canonical_name: pasta_water, base_roles: "body\nhydration", default_availability_class: very_common }
  # ---- experimental / scout fillers (plausible but uncommon; Nordic-aware) ----
  - canonical_name: rye_crumbs
    aliases: "rye breadcrumbs\nrye crumb"
    base_roles: "crunch\ncarb\ncarrier"
    default_availability_class: very_common
    repairs: "soft\nmushy\nsoup\nsoft_veg\ndry_needs_texture"
    avoid_when: "already_crunchy\nsweet_dessert"
  - { canonical_name: smoked_yogurt,     base_roles: "cream\nfat",       default_availability_class: occasional }
  - { canonical_name: lingonberry_vinegar, base_roles: "acid",           default_availability_class: common }
  - { canonical_name: sumac,            base_roles: "acid\numami",        default_availability_class: occasional }
  - { canonical_name: brown_butter,      base_roles: "fat",               default_availability_class: very_common }
  - { canonical_name: walnut,          base_roles: "crunch\nfat",        default_availability_class: common }
  - { canonical_name: orange_zest,      base_roles: "aromatic\nacid",     default_availability_class: common }
  - { canonical_name: miso,            base_roles: "umami",              default_availability_class: occasional }
  - { canonical_name: fennel_pollen,    base_roles: "herb\naromatic",     default_availability_class: rare }
  # ---- role-only fillers (no tree; pure role providers) ----
  - canonical_name: mustard
    aliases: "dijon\nwhole-grain mustard"
    base_roles: "acid\numami\nheat"
    default_availability_class: very_common
    repairs: "heavy\nfatty\nfried\nbland\npotato\nmeat\nsausage\nlegume"
    avoid_when: "delicate\nsweet_dessert\nhigh_heat_long\nalready_spicy"
  - canonical_name: pickles
    aliases: "pickled cucumber\ngerkens\npickle"
    base_roles: "acid\ncrunch"
    default_availability_class: very_common
    repairs: "heavy\nfatty\nfried\nbland\nrich_meat\npotato\nsausage"
    avoid_when: "already_high_acid\ndelicate\nraw_fish\nsweet"
  - { canonical_name: rosemary,   base_roles: "herb\naromatic",         default_availability_class: common }
  - { canonical_name: dill,        base_roles: "herb",                    default_availability_class: common }
  - { canonical_name: bacon,       base_roles: "fat\nsalt\numami\nprotein", default_availability_class: common }
  - { canonical_name: gruyere,    aliases: "gruyère", base_roles: "fat\nprotein\numami", default_availability_class: occasional }
  - canonical_name: soy_sauce
    aliases: "soy sauce"
    base_roles: "salt\numami"
    default_availability_class: very_common
    repairs: "bland\nroasted\nfried\nrice\ngrain\nlegume\nmushroom\nmeat"
    avoid_when: "already_salty\ndelicate\ndairy\nsweet_dessert\nraw_fish_delicate"
  # ---- Round 5 filler pack additions (kind: filler; rich profile) ----
  # sauerkraut is the fermented-cabbage filler (cabbage itself becomes a full
  # ingredient in Round 6). Fresh herbs / chili are generic convenience fillers
  # alongside the named herbs (basil/dill/parsley) and chile_flakes/jalapeno.
  - canonical_name: sauerkraut
    aliases: "fermented cabbage\nhapankaali"
    base_roles: "acid\ncrunch\nsalt"
    default_availability_class: common
    repairs: "heavy\nfatty\nfried\nrich_meat\nsausage\npork\npotato\nbland"
    avoid_when: "already_high_acid\ndelicate\ndairy_clash\nlong_cook\nsweet"
  - canonical_name: fresh_herbs
    aliases: "fresh herb\nherbs\ngarnish"
    base_roles: "herb"
    default_availability_class: common
    repairs: "heavy\nroasted\nfried\nbland\nrich\nstew\nsoup"
    avoid_when: "long_cook\nalready_delicate\nhigh_heat_dry"
  - canonical_name: chili
    aliases: "fresh chili\nchilli\nchili pepper"
    base_roles: "heat"
    default_availability_class: common
    repairs: "bland\nrich\nfatty\nsweet_bland"
    avoid_when: "already_spicy\ndelicate\ndairy_cream\nhigh_acid_raw"

