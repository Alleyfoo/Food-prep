  - { name: roasted_potato_component,           kind: cooked,       keeps_well: short,  freezes_well: 1, batch_prep_value: high }
  - { name: fried_potato_component,             kind: cooked,       keeps_well: short,  freezes_well: 0, batch_prep_value: low }
  - { name: potato_gratin_component,            kind: cooked,       keeps_well: short,  freezes_well: 1, batch_prep_value: medium }
  - { name: baked_potato_component,             kind: cooked,       keeps_well: short,  freezes_well: 0, batch_prep_value: low }
  - { name: potato_soup_base,                   kind: cooked,       keeps_well: medium, freezes_well: 1, batch_prep_value: high }
