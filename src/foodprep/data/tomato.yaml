# Tomato transformation ontology — hand-authored MVP.
# Encodes: ingredient -> technique -> component -> missing roles -> next ingredient.
# Availability classes approximate a Finnish / Lidl-style supermarket, not live stock.

# The pilot ingredient. Transformations/pairings inherit this unless they set
# their own `ingredient` / `for_ingredient` field.
default_ingredient: tomato

evidence_sources:
  - id: nchfp
    source_type: official
    title: "National Center for Home Food Preservation — tomato guidance"
    license: public
    citation_text: "NCHFP, tomato canning/freezing/drying/pickling guidance"
  - id: usda_tomato
    source_type: official
    title: "USDA Complete Guide to Home Canning — tomato products"
    license: public
    citation_text: "USDA, tomato juice/crushed/sauce/salsa preserve states"
  - id: recipedb
    source_type: dataset
    title: "RecipeDB (118k recipes, 268 processes)"
    license: CC BY-NC-SA
    citation_text: "RecipeDB, structured cooking processes"
  - id: mmres
    source_type: dataset
    title: "MM-ReS workflow graphs"
    license: research
    citation_text: "MM-ReS, human-labeled recipe workflow graphs"
  - id: flavordb
    source_type: dataset
    title: "FlavorDB / FlavorDB2"
    license: research
    citation_text: "FlavorDB, flavor molecules & ingredient pairings"
  - id: caprese
    source_type: culinary
    title: "Caprese tradition"
    license: n/a
    citation_text: "tomato + mozzarella + basil + olive oil + salt"
  - id: pico
    source_type: culinary
    title: "Pico de gallo / fresh salsa"
    license: n/a
    citation_text: "tomato + onion + chile + lime + cilantro + salt"
  - id: pappa
    source_type: culinary
    title: "Pappa al pomodoro"
    license: n/a
    citation_text: "bread-thickened tomato soup (bread + oil + garlic + basil)"
  - id: pomodoro
    source_type: culinary
    title: "Pasta al pomodoro"
    license: n/a
    citation_text: "olive oil + alliums + tomato + basil + cheese"
  - id: roast_culinary
    source_type: culinary
    title: "Slow-roasted / charred tomato traditions"
    license: n/a
    citation_text: "roasting concentrates & jams; charring adds smoke"

roles:
  - { name: salt,        family: seasoning }
  - { name: fat,         family: richness }
  - { name: acid,        family: lift }
  - { name: herb,        family: lift }
  - { name: aromatic,    family: lift }
  - { name: crunch,      family: structure }
  - { name: body,        family: structure }
  - { name: carb,        family: structure }
  - { name: protein,     family: balance }
  - { name: heat,        family: balance }
  - { name: umami,       family: balance }
  - { name: cream,       family: richness }
  - { name: carrier,     family: structure }
  - { name: hydration,   family: balance }
  - { name: mild_base,   family: balance }

# Tags are produced BY a transformation (flavour/texture/state shifts).
tags:
  - { family: flavour, value: fresh }
  - { family: flavour, value: juicy }
  - { family: flavour, value: acidic }
  - { family: flavour, value: sweet }
  - { family: flavour, value: concentrated }
  - { family: flavour, value: savory }
  - { family: flavour, value: smoky }
  - { family: flavour, value: umami }
  - { family: flavour, value: sweet_sour }
  - { family: flavour, value: spicy }
  - { family: flavour, value: sharp }
  - { family: texture, value: soft }
  - { family: texture, value: jammy }
  - { family: texture, value: chewy }
  - { family: texture, value: saucy }
  - { family: texture, value: dense }
  - { family: texture, value: liquid }
  - { family: texture, value: firm }
  - { family: texture, value: less_watery }
  - { family: texture, value: spoonable }
  - { family: state,    value: roasted }
  - { family: state,    value: charred }
  - { family: state,    value: cooked }
  - { family: state,    value: preserved }
  - { family: state,    value: shelf_stable }
  - { family: state,    value: frozen }
  - { family: state,    value: dried }

dish_contexts:
  - salad
  - sandwich
  - toast
  - bowl
  - caprese
  - panzanella
  - salsa
  - taco
  - wrap
  - dip
  - pizza
  - pasta
  - soup
  - chilled_soup
  - stew
  - braise
  - beans
  - rice
  - grains
  - eggs
  - smoky_sauce
  - condiment
  - cheese_board
  - relish
  - future_sauce
  - future_soup
  - pantry_base

techniques:
  - { name: slice,        is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: dice,         is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: grate,        is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: peel,         is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: deseed,       is_modifier: 1, heat_type: none,    moisture_change: lose,  preservation_flag: 0 }
  - { name: crush,        is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: raw_assemble, is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: salt_and_drain, is_modifier: 0, heat_type: none,  moisture_change: lose,  preservation_flag: 0 }
  - { name: salsa,        is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: roast,        is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: char,         is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: simmer,       is_modifier: 0, heat_type: wet,     moisture_change: lose,  preservation_flag: 0 }
  - { name: reduce,       is_modifier: 0, heat_type: wet,     moisture_change: lose,  preservation_flag: 0 }
  - { name: soup,         is_modifier: 0, heat_type: wet,     moisture_change: gain,  preservation_flag: 0 }
  - { name: dry,          is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 1 }
  - { name: pickle,       is_modifier: 0, heat_type: wet,     moisture_change: gain,  preservation_flag: 1 }
  - { name: freeze,       is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 1 }
  - { name: can,          is_modifier: 0, heat_type: wet,     moisture_change: none,  preservation_flag: 1 }
  - { name: saute,        is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: caramelize,   is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }

# ---- Ingredients -----------------------------------------------------------
# tomato is the pilot ingredient. The rest are fillers (pairing ingredients).
ingredients:
  - canonical_name: tomato
    aliases: "tomatoes\ntomaatti"
    base_roles: "acid\njuicy_component"
    default_availability_class: very_common
    availability:
      - { region_code: FI, availability_class: very_common, seasonality_note: "Finnish greenhouse July-Sep; imported year-round" }

  - { canonical_name: olive_oil,  base_roles: "fat",        default_availability_class: very_common }
  - { canonical_name: basil,      base_roles: "herb",       default_availability_class: common }
  - { canonical_name: parsley,    base_roles: "herb",       default_availability_class: common }
  - { canonical_name: cilantro,   base_roles: "herb",       default_availability_class: occasional }
  - { canonical_name: thyme,      base_roles: "herb",       default_availability_class: common }
  - { canonical_name: garlic,     base_roles: "aromatic",   default_availability_class: very_common }
  - { canonical_name: onion,      base_roles: "aromatic",   default_availability_class: very_common }
  - { canonical_name: mozzarella, base_roles: "fat\nprotein", default_availability_class: common }
  - { canonical_name: parmesan,   base_roles: "umami\nfat", default_availability_class: common }
  - { canonical_name: soft_cheese, aliases: "ricotta\nfeta", base_roles: "fat\nprotein", default_availability_class: common }
  - { canonical_name: bread,      base_roles: "carb\ncrunch", default_availability_class: very_common }
  - { canonical_name: croutons,   base_roles: "crunch\ncarb", default_availability_class: common }
  - { canonical_name: pasta,      base_roles: "carb",       default_availability_class: very_common }
  - { canonical_name: rice,       base_roles: "carb",       default_availability_class: very_common }
  - { canonical_name: tortilla,   base_roles: "carb\ncarrier", default_availability_class: occasional }
  - { canonical_name: lime,       base_roles: "acid",       default_availability_class: common }
  - { canonical_name: lemon,      base_roles: "acid",       default_availability_class: very_common }
  - { canonical_name: vinegar,    base_roles: "acid",       default_availability_class: very_common }
  - { canonical_name: jalapeno,   base_roles: "heat",       default_availability_class: occasional }
  - { canonical_name: chile_flakes, aliases: "chilli flakes\nred pepper flakes", base_roles: "heat", default_availability_class: very_common }
  - { canonical_name: cream,      base_roles: "cream\nfat", default_availability_class: common }
  - { canonical_name: yogurt,     base_roles: "cream\nprotein", default_availability_class: very_common }
  - { canonical_name: eggs,       base_roles: "protein",    default_availability_class: very_common }
  - { canonical_name: cucumber,   base_roles: "crunch\nhydration", default_availability_class: very_common }
  - { canonical_name: capers,     base_roles: "acid\numami", default_availability_class: occasional }
  - { canonical_name: olives,     base_roles: "salt\numami", default_availability_class: common }
  - { canonical_name: white_beans, aliases: "cannellini\nharicot", base_roles: "protein\ncarb", default_availability_class: common }
  - { canonical_name: potato,     base_roles: "carb\nmild_base", default_availability_class: very_common }
  - { canonical_name: avocado,    base_roles: "fat",        default_availability_class: occasional }
  - { canonical_name: greens,     aliases: "lettuce\nspinach", base_roles: "herb\nmild_base", default_availability_class: very_common }
  - { canonical_name: stock,      base_roles: "body\numami", default_availability_class: common }
  - { canonical_name: butter,     base_roles: "fat",        default_availability_class: very_common }
  - { canonical_name: black_pepper, aliases: "pepper", base_roles: "aromatic", default_availability_class: very_common }
  - { canonical_name: sea_salt,   aliases: "salt\nflaky salt", base_roles: "salt", default_availability_class: very_common }
  - { canonical_name: grilled_fish, base_roles: "protein",  default_availability_class: occasional }
  - { canonical_name: tofu,       base_roles: "protein",    default_availability_class: common }
