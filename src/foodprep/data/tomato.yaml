  - { name: dice,         is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: grate,        is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: peel,         is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: deseed,       is_modifier: 1, heat_type: none,    moisture_change: lose,  preservation_flag: 0 }
  - { name: crush,        is_modifier: 1, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: raw_assemble, is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: salt_and_drain, is_modifier: 0, heat_type: none,  moisture_change: lose,  preservation_flag: 0 }
  - { name: salsa,        is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: roast,        is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: char,         is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: simmer,       is_modifier: 0, heat_type: wet,     moisture_change: lose,  preservation_flag: 0 }
  - { name: reduce,       is_modifier: 0, heat_type: wet,     moisture_change: lose,  preservation_flag: 0 }
