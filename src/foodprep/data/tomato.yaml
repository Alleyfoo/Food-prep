  - { name: dry,          is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 1 }
  - { name: pickle,       is_modifier: 0, heat_type: wet,     moisture_change: gain,  preservation_flag: 1 }
  - { name: freeze,       is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 1 }
  - { name: can,          is_modifier: 0, heat_type: wet,     moisture_change: none,  preservation_flag: 1 }
  - { name: saute,        is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
