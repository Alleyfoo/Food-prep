# Tomato transformation ontology — hand-authored MVP.
# Encodes: ingredient -> technique -> component -> missing roles -> next ingredient.
# Availability classes approximate a Finnish / Lidl-style supermarket, not live stock.

# The pilot ingredient. Transformations/pairings inherit this unless they set
# their own `ingredient` / `for_ingredient` field.
default_ingredient: tomato

evidence_sources:
  - id: nchfp
    source_type: official
    title: "National Center for Home Food Preservation — tomato guidance"
    license: public
    citation_text: "NCHFP, tomato canning/freezing/drying/pickling guidance"
  - id: usda_tomato
    source_type: official
    title: "USDA Complete Guide to Home Canning — tomato products"
    license: public
    citation_text: "USDA, tomato juice/crushed/sauce/salsa preserve states"
  - id: recipedb
    source_type: dataset
    title: "RecipeDB (118k recipes, 268 processes)"
    license: CC BY-NC-SA
    citation_text: "RecipeDB, structured cooking processes"
  - id: mmres
    source_type: dataset
    title: "MM-ReS workflow graphs"
    license: research
    citation_text: "MM-ReS, human-labeled recipe workflow graphs"
  - id: flavordb
    source_type: dataset
    title: "FlavorDB / FlavorDB2"
    license: research
    citation_text: "FlavorDB, flavor molecules & ingredient pairings"
  - id: caprese
    source_type: culinary
    title: "Caprese tradition"
    license: n/a
    citation_text: "tomato + mozzarella + basil + olive oil + salt"
  - id: pico
    source_type: culinary
    title: "Pico de gallo / fresh salsa"
    license: n/a
    citation_text: "tomato + onion + chile + lime + cilantro + salt"
  - id: pappa
    source_type: culinary
    title: "Pappa al pomodoro"
    license: n/a
    citation_text: "bread-thickened tomato soup (bread + oil + garlic + basil)"
  - id: pomodoro
    source_type: culinary
    title: "Pasta al pomodoro"
    license: n/a
    citation_text: "olive oil + alliums + tomato + basil + cheese"
  - id: roast_culinary
    source_type: culinary
    title: "Slow-roasted / charred tomato traditions"
    license: n/a
    citation_text: "roasting concentrates & jams; charring adds smoke"

roles:
  - { name: salt,        family: seasoning }
  - { name: fat,         family: richness }
  - { name: acid,        family: lift }
  - { name: herb,        family: lift }
  - { name: aromatic,    family: lift }
  - { name: crunch,      family: structure }
  - { name: body,        family: structure }
  - { name: carb,        family: structure }
  - { name: protein,     family: balance }
  - { name: heat,        family: balance }
  - { name: umami,       family: balance }
  - { name: cream,       family: richness }
  - { name: carrier,     family: structure }
  - { name: hydration,   family: balance }
  - { name: mild_base,   family: balance }

# Tags are produced BY a transformation (flavour/texture/state shifts).
tags:
  - { family: flavour, value: fresh }
  - { family: flavour, value: juicy }
  - { family: flavour, value: acidic }
  - { family: flavour, value: sweet }
  - { family: flavour, value: concentrated }
  - { family: flavour, value: savory }
  - { family: flavour, value: smoky }
  - { family: flavour, value: umami }
  - { family: flavour, value: sweet_sour }
  - { family: flavour, value: spicy }
  - { family: flavour, value: sharp }
  - { family: flavour, value: sulfurous }
  - { family: flavour, value: vegetal }
  - { family: texture, value: soft }
  - { family: texture, value: jammy }
  - { family: texture, value: chewy }
  - { family: texture, value: saucy }
  - { family: texture, value: dense }
  - { family: texture, value: liquid }
  - { family: texture, value: firm }
  - { family: texture, value: less_watery }
