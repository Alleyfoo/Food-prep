  - { name: potato_hash_component,              kind: cooked,       keeps_well: short,  freezes_well: 1, batch_prep_value: medium }
  # ---- cabbage components (fourth ingredient) ----
  - { name: raw_cabbage_slaw_component,         kind: fresh,        keeps_well: short,  freezes_well: 0, batch_prep_value: low }
  - { name: salted_cabbage_component,           kind: fresh,        keeps_well: short,  freezes_well: 0, batch_prep_value: medium }
  - { name: stir_fried_cabbage_component,       kind: cooked,       keeps_well: short,  freezes_well: 1, batch_prep_value: medium }
  - { name: roasted_cabbage_component,          kind: cooked,       keeps_well: short,  freezes_well: 1, batch_prep_value: high }
