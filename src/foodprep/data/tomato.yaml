# ---- Component profiles: non-tomato plate items for meal-repair logic ------
# provides_roles is what this item brings to a plate; the meal-repair engine
# unions these across items and subtracts from a balanced target.
component_profiles:
  - name: mashed_potatoes
    aliases: "mash\nmashed potato"
    provides_roles: "carb\ncream\nbody\nsalt\nmild_base"
    flavour_tags: "mild\ncreamy\nbuttery"
    texture_tags: "soft\nsmooth"
    notes: "rich, soft, mild — cuts need acid + crunch + freshness"
  - name: roasted_chickpea_patty
    aliases: "chickpea patty\nchickpea patties\nlegume patty"
    provides_roles: "protein\ncarb\numami"
