  - { name: mash,         is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: fry,          is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: gratin,       is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: bake,         is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  - { name: salad,        is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
  - { name: hash,         is_modifier: 0, heat_type: dry,     moisture_change: lose,  preservation_flag: 0 }
  # ---- cabbage techniques (fourth ingredient) ----
  - { name: raw_slaw,     is_modifier: 0, heat_type: none,    moisture_change: none,  preservation_flag: 0 }
