# ---- Transformations -------------------------------------------------------
transformations:
  - technique: raw_assemble
    output_component: fresh_tomato_component
    flavour_shift: "Bright, juicy, sweet-acidic"
    texture_shift: "Juicy, soft, sometimes watery"
    confidence: high
    tags_after:
      - { family: flavour, value: fresh,    polarity: gain }
      - { family: flavour, value: juicy,    polarity: gain }
      - { family: flavour, value: acidic,   polarity: gain }
      - { family: flavour, value: sweet,    polarity: gain }
    missing_roles:
      - { role: salt,    priority: high,   note: "seasoning" }
      - { role: fat,     priority: high,   note: "olive oil or cheese" }
      - { role: herb,    priority: medium, note: "basil/parsley" }
      - { role: crunch,  priority: medium, note: "carrier or croutons" }
      - { role: carrier, priority: medium, note: "bread/toast" }
    uses: [salad, sandwich, toast, bowl, caprese, panzanella]
    evidence:
      - { source: caprese, scope: "fresh tomato + mozzarella + basil + oil + salt" }
      - { source: pico,    scope: "fresh chopped tomato base" }

  - technique: salt_and_drain
    output_component: salted_drained_tomato_component
    flavour_shift: "More intense, sweeter, less bitter"
    texture_shift: "Less watery, firmer surface"
    confidence: high
    tags_after:
      - { family: flavour, value: concentrated, polarity: gain }
      - { family: texture, value: less_watery,  polarity: gain }
    missing_roles:
      - { role: fat,     priority: high,   note: "olive oil" }
      - { role: herb,    priority: medium, note: "basil" }
      - { role: crunch,  priority: medium, note: "croutons/toast" }
      - { role: carrier, priority: medium, note: "bread" }
    uses: [sandwich, panzanella, salad, toast]
    evidence:
      - { source: roast_culinary, scope: "osmosis drains water, intensifies flavour" }

  - technique: salsa
    output_component: tomato_salsa_component
    flavour_shift: "Fresh, sharp, bright; spicy if chile added"
    texture_shift: "Chunky, spoonable"
    confidence: high
    tags_after:
      - { family: flavour, value: fresh,  polarity: gain }
      - { family: flavour, value: sharp,  polarity: gain }
      - { family: flavour, value: acidic, polarity: gain }
      - { family: flavour, value: spicy,  polarity: gain }
      - { family: texture, value: spoonable, polarity: gain }
    missing_roles:
      - { role: carrier,  priority: high,   note: "tortilla/toast" }
      - { role: fat,      priority: medium, note: "avocado/cheese" }
      - { role: protein,  priority: low,    note: "eggs/beans optional" }
    uses: [taco, wrap, bowl, dip]
    evidence:
      - { source: pico, scope: "tomato + onion + chile + lime + cilantro + salt" }

  - technique: roast
    output_component: roasted_tomato_component
    flavour_shift: "Sweeter, deeper, more savory, concentrated"
    texture_shift: "Soft, collapsed, jammy"
    confidence: high
    tags_after:
      - { family: flavour, value: sweet,        polarity: gain }
      - { family: flavour, value: concentrated, polarity: gain }
      - { family: flavour, value: savory,       polarity: gain }
      - { family: texture, value: jammy,        polarity: gain }
      - { family: state,   value: roasted,      polarity: gain }
    missing_roles:
      - { role: salt,  priority: high,   note: "flaky salt" }
      - { role: herb,  priority: medium, note: "basil/parsley lift" }
      - { role: acid,  priority: medium, note: "vinegar/lemon if overly sweet" }
      - { role: carb,  priority: medium, note: "pasta/bread/beans" }
      - { role: protein, priority: low,  note: "cheese/eggs" }
    uses: [pasta, pizza, toast, soup, bowl]
    evidence:
      - { source: roast_culinary, scope: "slow roasting jams & concentrates" }

  - technique: char
    output_component: charred_tomato_component
    flavour_shift: "Smokier, sweeter, deeper"
    texture_shift: "Softened, blistered"
    confidence: high
    tags_after:
      - { family: flavour, value: smoky, polarity: gain }
      - { family: flavour, value: sweet, polarity: gain }
      - { family: state,   value: charred, polarity: gain }
    missing_roles:
      - { role: acid,    priority: high,   note: "lime" }
      - { role: herb,    priority: high,   note: "fresh herbs" }
      - { role: fat,     priority: medium, note: "olive oil" }
      - { role: carrier, priority: medium, note: "bread/tortilla" }
    uses: [smoky_sauce, taco, beans, grains, dip]
    evidence:
      - { source: roast_culinary, scope: "fire-roasting adds smoke + sweetness" }

  - technique: simmer
    output_component: tomato_sauce_base
    flavour_shift: "Deepened, rounded, integrated with aromatics"
    texture_shift: "Saucy, cohesive"
    confidence: high
    tags_after:
      - { family: flavour, value: savory, polarity: gain }
      - { family: texture, value: saucy,  polarity: gain }
      - { family: state,   value: cooked, polarity: gain }
    missing_roles:
      - { role: fat,       priority: high,   note: "olive oil/butter" }
      - { role: aromatic,  priority: high,   note: "garlic/onion top notes" }
      - { role: carb,      priority: high,   note: "pasta/rice/bread" }
      - { role: protein,   priority: medium, note: "eggs/beans/cheese" }
      - { role: herb,      priority: medium, note: "basil finish" }
    uses: [pasta, eggs, beans, stew, rice]
    evidence:
      - { source: pomodoro,  scope: "oil + alliums + tomato + basil + cheese" }
      - { source: usda_tomato, scope: "sauce as a distinct reduced state" }

  - technique: reduce
    output_component: reduced_tomato_base
    flavour_shift: "Strong umami, caramelized, very concentrated"
    texture_shift: "Thick, dense"
    confidence: high
    tags_after:
      - { family: flavour, value: umami,       polarity: gain }
      - { family: flavour, value: concentrated, polarity: gain }
      - { family: texture, value: dense,       polarity: gain }
    missing_roles:
      - { role: fat,      priority: high,   note: "oil/butter" }
      - { role: hydration, priority: high,   note: "stock/pasta water dilution" }
      - { role: acid,     priority: medium, note: "balance" }
    uses: [stew, braise, soup, pasta, pizza, beans]
    evidence:
      - { source: usda_tomato, scope: "reduction by one-third to one-half" }

  - technique: soup
    output_component: tomato_soup_base
    flavour_shift: "Softer acidity, rounded, aromatic"
    texture_shift: "Liquid to thick depending on bread/cream"
    confidence: medium_high
    tags_after:
      - { family: flavour, value: savory, polarity: gain }
      - { family: texture, value: liquid, polarity: gain }
    missing_roles:
      - { role: cream,   priority: high,   note: "cream/yogurt for silkiness" }
      - { role: body,    priority: high,   note: "bread (pappa al pomodoro)" }
      - { role: crunch,  priority: medium, note: "croutons/cheese toast" }
      - { role: protein, priority: low,    note: "beans/eggs" }
    uses: [soup, chilled_soup]
    evidence:
      - { source: pappa, scope: "bread + oil + garlic + basil for body" }

  - technique: dry
    output_component: dried_tomato_component
    flavour_shift: "Intensified sweet-savory"
    texture_shift: "Chewy or leathery until rehydrated"
    confidence: medium
    tags_after:
      - { family: flavour, value: concentrated, polarity: gain }
      - { family: flavour, value: sweet,        polarity: gain }
      - { family: texture, value: chewy,        polarity: gain }
      - { family: state,   value: dried,        polarity: gain }
      - { family: state,   value: preserved,    polarity: gain }
    missing_roles:
      - { role: hydration, priority: high,   note: "soaking liquid / oil" }
      - { role: fat,       priority: high,   note: "olive oil" }
      - { role: mild_base, priority: medium, note: "pasta/bread/greens" }
      - { role: herb,      priority: low,    note: "fresh contrast" }
    uses: [pasta, salad, relish, toast]
    evidence:
      - { source: nchfp, scope: "drying as preservation; reconstitute for use" }

  - technique: pickle
    output_component: pickled_tomato_component
    flavour_shift: "Sharper, sweet-sour, spiced"
    texture_shift: "Firm-pickled or jammy-chutney"
    confidence: medium
    tags_after:
      - { family: flavour, value: sweet_sour, polarity: gain }
      - { family: flavour, value: acidic,     polarity: gain }
      - { family: state,   value: preserved,  polarity: gain }
    missing_roles:
      - { role: mild_base, priority: high,   note: "bread/potatoes" }
      - { role: fat,       priority: medium, note: "cheese" }
      - { role: protein,   priority: medium, note: "grilled fish/tofu/cheese" }
    uses: [condiment, sandwich, cheese_board, relish]
    evidence:
      - { source: nchfp, scope: "green tomato pickles & chutney" }

  - technique: freeze
    output_component: frozen_tomato_base
    flavour_shift: "Flavour preserved for cooked uses"
    texture_shift: "Collapses on thawing"
    confidence: high
    tags_after:
      - { family: state, value: frozen,   polarity: gain }
      - { family: state, value: preserved, polarity: gain }
    missing_roles:
      - { role: mild_base, priority: low, note: "downstream recipe context supplies all roles" }
    uses: [future_sauce, future_soup, stew]
    evidence:
      - { source: nchfp, scope: "freeze for cooking/seasoning, not fresh firm use" }

  - technique: can
    output_component: canned_tomato_base
    flavour_shift: "Stable cooked-tomato flavour"
    texture_shift: "Soft / sauce-oriented"
    confidence: high
    tags_after:
      - { family: state, value: shelf_stable, polarity: gain }
      - { family: state, value: preserved,    polarity: gain }
      - { family: state, value: cooked,       polarity: gain }
    missing_roles:
      - { role: mild_base, priority: low, note: "downstream recipe context supplies all roles" }
    uses: [pantry_base, future_sauce, future_soup, stew]
    evidence:
      - { source: usda_tomato, scope: "juice/crushed/sauce/salsa as formal preserve states" }
      - { source: nchfp, scope: "canned tomato products" }

  # ---- onion transformations (second ingredient) ----
  # Co-occurrence evidence from CulinaryDB (17k onion recipes): garlic, tomato,
  # butter, parsley, cilantro, vinegar, thyme, beef, potato, beans, bread, cheese.
  - ingredient: onion
    technique: raw_assemble
    output_component: raw_onion_component
    flavour_shift: "Sharp, pungent, crisp"
    texture_shift: "Crisp, crunchy"
    confidence: high
    tags_after:
      - { family: flavour, value: sharp,  polarity: gain }
      - { family: flavour, value: fresh,  polarity: gain }
      - { family: texture, value: firm,   polarity: gain }
    missing_roles:
      - { role: acid,    priority: high,   note: "vinegar/lemon mellows pungency" }
      - { role: salt,    priority: high,   note: "seasoning" }
      - { role: fat,     priority: medium, note: "olive oil" }
      - { role: herb,    priority: medium, note: "parsley/cilantro" }
      - { role: crunch,  priority: low,    note: "already crisp" }
    uses: [salad, salsa, sandwich, taco, dip]
    evidence:
      - { source: recipedb, scope: "raw onion in salads/salsas/sandwiches" }

  - ingredient: onion
    technique: saute
    output_component: sauteed_onion_component
    flavour_shift: "Sweetened, softened, aromatic"
    texture_shift: "Soft, translucent"
    confidence: high
    tags_after:
      - { family: flavour, value: sweet,  polarity: gain }
      - { family: flavour, value: savory, polarity: gain }
      - { family: texture, value: soft,   polarity: gain }
      - { family: state,   value: cooked, polarity: gain }
    missing_roles:
      - { role: fat,      priority: high,   note: "oil/butter to sweat in" }
      - { role: aromatic, priority: medium, note: "garlic builds the base" }
      - { role: salt,     priority: medium, note: "seasoning" }
      - { role: herb,     priority: low,    note: "thyme/parsley finish" }
      - { role: carb,     priority: low,    note: "build into sauce/soup" }
    uses: [soup, stew, braise, beans, rice, smoky_sauce]
    evidence:
      - { source: recipedb, scope: "sauteed onion as aromatic base" }
      - { source: pomodoro,  scope: "onion + garlic + tomato sauce base" }

  - ingredient: onion
    technique: caramelize
    output_component: caramelized_onion_component
    flavour_shift: "Deeply sweet, jammy, browned"
    texture_shift: "Jammy, soft, collapsed"
    confidence: high
    tags_after:
      - { family: flavour, value: sweet,        polarity: gain }
      - { family: flavour, value: concentrated, polarity: gain }
      - { family: texture, value: jammy,        polarity: gain }
      - { family: state,   value: cooked,       polarity: gain }
    missing_roles:
      - { role: acid,       priority: high,   note: "vinegar balance sweetness" }
      - { role: salt,       priority: high,   note: "seasoning" }
      - { role: herb,       priority: medium, note: "thyme" }
      - { role: carb,       priority: medium, note: "bread/tart base" }
      - { role: protein,    priority: low,    note: "beef/cheese" }
      - { role: hydration,  priority: low,    note: "stock to deglaze" }
    uses: [sandwich, pizza, soup, stew, braise, toast]
    evidence:
      - { source: recipedb, scope: "caramelized onion in tarts/soups/stews" }

  - ingredient: onion
    technique: pickle
    output_component: pickled_onion_component
    flavour_shift: "Sharp, sweet-sour, bright"
    texture_shift: "Crisp-pickled"
    confidence: medium
    tags_after:
      - { family: flavour, value: sweet_sour, polarity: gain }
      - { family: flavour, value: sharp,     polarity: gain }
      - { family: state,   value: preserved,  polarity: gain }
    missing_roles:
      - { role: mild_base, priority: high,   note: "taco/beans/potato host" }
      - { role: fat,      priority: medium, note: "cheese/avocado" }
      - { role: protein,  priority: medium, note: "beans/cheese/fish" }
    uses: [taco, sandwich, salad, cheese_board]
    evidence:
      - { source: nchfp, scope: "pickled onions as condiment" }

  # ---- potato transformations (third ingredient) ----
  # Potato is `kind: both`: it has its own technique tree AND remains a filler
  # (mild_base) for tomato/onion pairings. Missing roles per the curated spec:
  #   boil → fat/salt/herb/acid ; mash → acid/crunch/freshness(herb)/protein
  #   roast → sauce(hydration)/acid/protein/freshness(herb)
  #   salad → acid-fat balance/ herb/crunch ; gratin → acid/fresh side(herb)/protein if main
  # fry/bake/soup/hash are curated (user did not specify).
  - ingredient: potato
    technique: boil
    output_component: boiled_potato_component
    flavour_shift: "Neutral, earthy, starchy"
    texture_shift: "Soft, tender, waterlogged surface"
    confidence: high
    tags_after:
      - { family: flavour, value: savory, polarity: gain }
      - { family: texture, value: soft,   polarity: gain }
      - { family: state,   value: cooked, polarity: gain }
    missing_roles:
      - { role: fat,  priority: high,   note: "butter/oil" }
