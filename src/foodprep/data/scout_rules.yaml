  # === POTATO ===
  - id: soft_egg_for_butter_on_mashed_potato
    known_pairing: "mashed potatoes with butter"
    source_ingredient: butter
    substitute_ingredient: eggs
    mechanism: texture_contrast
    shared_function: "Both add richness, while a soft egg adds silky body that echoes the mash's creaminess."
    meaningful_difference: "Egg adds protein structure and a distinct cooked-egg flavour rather than pure fat."
    expected_risk: "The egg may make the mash taste like breakfast or become gluey if over-mixed."
    required_dimensions: "sweet\nrich_fatty"
    explanation_template: "{candidate} may replace {source} because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "2 tablespoons mash : 1 soft-boiled egg"
      smallest_test: "Fold one soft-boiled egg into two tablespoons of warm mash."
      success_condition: "Egg adds silky richness without making it taste like breakfast."
      likely_failure: "Egg makes the mash gluey or tastes too much like scrambled eggs."
      corrections: "Use less egg; add more butter; finish with chives."
      safety_note: "Use fresh eggs and fully cooked potatoes."

