analogy_rules:
  - id: tart_fruit_for_citrus_on_browned_vegetable
    known_pairing: "browned broccoli with lemon"
    source_ingredient: lemon
    substitute_ingredient: lingonberry_vinegar
    mechanism: analogue_substitution
    shared_function: "Both act as sharp acidic finishes that can balance browned sweetness."
    meaningful_difference: "Lingonberry vinegar adds dark berry aroma and a stronger risk of reading as sweet fruit."
    expected_risk: "The berry character may make the broccoli taste jam-like or perfumed."
    required_dimensions: "sweet\nnutty_toasted"
    explanation_template: "{candidate} may replace {source} as an acidic finish because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "1 small roasted floret : 3 drops lingonberry vinegar"
      smallest_test: "Dress one warm roasted floret with three drops; do not season the whole batch."
      success_condition: "Acidity sharpens the browned broccoli without the berry aroma reading as jam or dessert."
      likely_failure: "Fruit aroma dominates or makes the broccoli seem sweet."
      corrections: "Increase salt; dilute with plain vinegar; reduce the lingonberry vinegar to one drop."
      safety_note: "Use commercially prepared vinegar and fully cooked broccoli; this is a flavour test, not preservation guidance."

  - id: browned_fat_for_plain_fat_on_toasted_state
    known_pairing: "roasted broccoli with olive oil"
    source_ingredient: olive_oil
    substitute_ingredient: brown_butter
    mechanism: flavour_reinforcement
    shared_function: "Both provide fat, while browned butter also reinforces toasted aromas."
    meaningful_difference: "Brown butter is richer and less fresh than olive oil."
    expected_risk: "The combination may become heavy and mute broccoli's green character."
    required_dimensions: "nutty_toasted"
    explanation_template: "{candidate} may reinforce this state because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium_high
    protocol:
      starting_ratio: "1 small roasted floret : 1/4 teaspoon brown butter"
      smallest_test: "Coat one warm floret lightly with brown butter and taste before dressing the batch."
      success_condition: "Nutty aroma reinforces browning while the broccoli remains recognizable and not greasy."
      likely_failure: "Fat coats the palate and suppresses green character."
      corrections: "Use half as much butter; add one drop lemon; finish with salt rather than more fat."
      safety_note: "Use freshly prepared brown butter without burned milk solids and fully cooked broccoli."

  - id: tart_stone_fruit_for_apple_on_sweet_root_mash
    known_pairing: "swede and apple mash"
    source_ingredient: apple
    substitute_ingredient: apricot
    mechanism: analogue_substitution
    shared_function: "Both are tart-sweet fruits that cut the sweetness and weight of a buttery root mash."
    meaningful_difference: "Apricot brings floral aroma and less juice, so it reads more perfumed than apple."
    expected_risk: "The mash may turn dessert-like if the apricot's sweetness outweighs its acidity."
    required_dimensions: "sweet\nrich_fatty"
    explanation_template: "{candidate} may replace {source} against a rich sweet mash because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "1 tablespoon warm rutabaga mash : 1 thin sliver of ripe apricot"
      smallest_test: "Fold one sliver of apricot into one spoonful of finished mash; do not add fruit to the pot."
      success_condition: "Fruit acidity lightens the buttery sweetness without the spoonful reading as dessert."
      likely_failure: "Apricot sweetness stacks on the mash and the spoonful turns jammy."
      corrections: "Add salt or black pepper; use a firmer more sour apricot; halve the fruit amount."
      safety_note: "Use washed ripe fruit and fully cooked mash; this is a flavour test, not preservation guidance."

  - id: stone_fruit_for_tomato_in_cool_salad
    known_pairing: "cucumber and tomato salad"
    source_ingredient: tomato
    substitute_ingredient: peach
    mechanism: analogue_substitution
    shared_function: "Both are juicy sweet-acid fruits that give a cool green salad its lift and body."
    meaningful_difference: "Peach is sweeter and more floral than tomato, with no savoury umami backbone."
    expected_risk: "The salad may read as fruit salad instead of a savoury side."
    required_dimensions: "fresh_green\nsweet"
    explanation_template: "{candidate} may replace {source} in a cool salad because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "2 cucumber slices : 1 thin slice of ripe peach"
      smallest_test: "Salt one cucumber slice, top with a sliver of peach, and taste before mixing a bowl."
      success_condition: "Peach adds perfumed sweetness while salt and the cucumber keep the bite savoury."
      likely_failure: "Sweetness dominates and the pairing reads as dessert."
      corrections: "More salt; a drop of vinegar; add chile flakes or black pepper."
      safety_note: "Use washed ripe fruit; this is a flavour test, not preservation guidance."

  - id: tropical_fruit_for_apple_on_massaged_greens
    known_pairing: "massaged kale salad with apple"
    source_ingredient: apple
    substitute_ingredient: mango
    mechanism: analogue_substitution
    shared_function: "Both are sweet-tart fruits that brighten a bitter massaged green and break up its chew."
    meaningful_difference: "Mango is softer and more perfumed than apple, trading crisp contrast for tropical aroma."
    expected_risk: "Ripe mango may read tropical-sweet and lose the crunch the salad wanted from apple."
    required_dimensions: "fresh_green\nbitter"
    explanation_template: "{candidate} may replace {source} on massaged greens because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "1 ribbon of massaged kale : 1 small cube of firm mango"
      smallest_test: "Wrap one ribbon of dressed massaged kale around one cube of firm (not fully ripe) mango and taste."
      success_condition: "The fruit's sweet-tart note lifts the bitter green without turning the bite tropical-dessert."
      likely_failure: "Soft ripe mango dominates with perfume and the bite loses its savoury footing."
      corrections: "Use firmer greener mango; add salt or chile flakes; cut the cubes smaller."
      safety_note: "Use washed ripe fruit; this is a flavour test, not preservation guidance."

  - id: dark_berry_acid_for_lime_on_sour_slaw
    known_pairing: "green mango slaw with lime"
    source_ingredient: lime
    substitute_ingredient: lingonberry_vinegar
    mechanism: analogue_substitution
    shared_function: "Both are sharp acids that frame a sour-crunch slaw instead of merely seasoning it."
    meaningful_difference: "Lingonberry vinegar swaps lime's citrus perfume for dark Nordic berry tartness."
    expected_risk: "The berry aroma may clash with the tropical green-fruit character instead of framing it."
    required_dimensions: "sour\nfresh_green"
    explanation_template: "{candidate} may replace {source} on a sour slaw because {shared_function} The state contributes {matched_dimensions}."
    confidence: low
    protocol:
      starting_ratio: "1 forkful of undressed green mango shreds : 2 drops lingonberry vinegar"
      smallest_test: "Dress one forkful of shreds with two drops plus a pinch of salt; taste against a lime-dressed forkful."
      success_condition: "The berry acid frames the sour crunch as lime would, adding dark fruit without muddying it."
      likely_failure: "Berry and green mango read as two competing fruits rather than one dish."
      corrections: "Add salt; cut with a drop of plain vinegar; add chile flakes to bridge."
      safety_note: "Use commercially prepared vinegar and washed fruit; this is a flavour test, not preservation guidance."

  - id: toasted_grain_for_nut_on_browned_sweet_state
    known_pairing: "roasted apricots with toasted walnuts"
    source_ingredient: walnut
    substitute_ingredient: rye_crumbs
    mechanism: flavour_reinforcement
    shared_function: "Both add toasted crunch that echoes browning on a sweet caramelised surface."
    meaningful_difference: "Rye crumbs bring dark grain bitterness and go soggy faster than nuts."
    expected_risk: "Crumbs may sog on juicy fruit, or the rye bitterness may clash instead of echoing."
    required_dimensions: "sweet\nnutty_toasted"
    explanation_template: "{candidate} may replace {source} on a browned sweet state because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "1 roasted apricot half : 1 small pinch of toasted rye crumbs"
      smallest_test: "Scatter a pinch of freshly toasted rye crumbs on one warm roasted half; eat within a minute, before they sog."
      success_condition: "The dark grain crunch reads as an echo of the browned fruit, not as bread on fruit."
      likely_failure: "Crumbs sog in the juice or the rye bitterness fights the fruit."
      corrections: "Toast the crumbs darker and drier; add a pinch of salt; serve the crumbs under the fruit instead of on top."
      safety_note: "Use fully toasted crumbs from ordinary bread and washed ripe fruit; this is a flavour test, not preservation guidance."

  - id: smoked_cream_for_plain_cream_in_soup
    known_pairing: "broccoli soup with yogurt"
    source_ingredient: yogurt
    substitute_ingredient: smoked_yogurt
    mechanism: aroma_bridge
    shared_function: "Both provide creamy acidity; smoke can bridge browned garnishes and a green soup base."
    meaningful_difference: "Smoke can dominate mild green flavours."
    expected_risk: "The soup may taste ashy or lose its fresh vegetable character."
    required_dimensions: "fermented_funky\nrich_fatty"
    explanation_template: "{candidate} is only plausible when {matched_dimensions} support the bridge: {shared_function}"
    confidence: low
    protocol:
      starting_ratio: "1 tablespoon soup : 1/8 teaspoon smoked yogurt"
      smallest_test: "Stir smoked yogurt into one spoonful away from the main pot."
      success_condition: "A faint smoke note adds depth without making the soup taste ashy."
      likely_failure: "Smoke dominates the green vegetable aroma."
      corrections: "Dilute with plain yogurt or soup; add fresh herbs; omit further smoke."
      safety_note: "Use refrigerated commercial yogurt and safely cooked soup; do not use this protocol for storage or fermentation."
