analogy_rules:
  - id: tart_fruit_for_citrus_on_browned_vegetable
    known_pairing: "browned broccoli with lemon"
    source_ingredient: lemon
    substitute_ingredient: lingonberry_vinegar
    mechanism: analogue_substitution
    shared_function: "Both act as sharp acidic finishes that can balance browned sweetness."
    meaningful_difference: "Lingonberry vinegar adds dark berry aroma and a stronger risk of reading as sweet fruit."
    expected_risk: "The berry character may make the broccoli taste jam-like or perfumed."
    required_dimensions: "sweet\nnutty_toasted"
    explanation_template: "{candidate} may replace {source} as an acidic finish because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "1 small roasted floret : 3 drops lingonberry vinegar"
      smallest_test: "Dress one warm roasted floret with three drops; do not season the whole batch."
      success_condition: "Acidity sharpens the browned broccoli without the berry aroma reading as jam or dessert."
      likely_failure: "Fruit aroma dominates or makes the broccoli seem sweet."
      corrections: "Increase salt; dilute with plain vinegar; reduce the lingonberry vinegar to one drop."
      safety_note: "Use commercially prepared vinegar and fully cooked broccoli; this is a flavour test, not preservation guidance."

  - id: browned_fat_for_plain_fat_on_toasted_state
    known_pairing: "roasted broccoli with olive oil"
    source_ingredient: olive_oil
    substitute_ingredient: brown_butter
    mechanism: flavour_reinforcement
    shared_function: "Both provide fat, while browned butter also reinforces toasted aromas."
    meaningful_difference: "Brown butter is richer and less fresh than olive oil."
    expected_risk: "The combination may become heavy and mute broccoli's green character."
    required_dimensions: "nutty_toasted"
    explanation_template: "{candidate} may reinforce this state because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium_high
    protocol:
      starting_ratio: "1 small roasted floret : 1/4 teaspoon brown butter"
      smallest_test: "Coat one warm floret lightly with brown butter and taste before dressing the batch."
      success_condition: "Nutty aroma reinforces browning while the broccoli remains recognizable and not greasy."
      likely_failure: "Fat coats the palate and suppresses green character."
      corrections: "Use half as much butter; add one drop lemon; finish with salt rather than more fat."
      safety_note: "Use freshly prepared brown butter without burned milk solids and fully cooked broccoli."

  - id: tart_stone_fruit_for_apple_on_sweet_root_mash
    known_pairing: "swede and apple mash"
    source_ingredient: apple
    substitute_ingredient: apricot
    mechanism: analogue_substitution
    shared_function: "Both are tart-sweet fruits that cut the sweetness and weight of a buttery root mash."
    meaningful_difference: "Apricot brings floral aroma and less juice, so it reads more perfumed than apple."
    expected_risk: "The mash may turn dessert-like if the apricot's sweetness outweighs its acidity."
    required_dimensions: "sweet\nrich_fatty"
    explanation_template: "{candidate} may replace {source} against a rich sweet mash because {shared_function} The state contributes {matched_dimensions}."
    confidence: medium
    protocol:
      starting_ratio: "1 tablespoon warm rutabaga mash : 1 thin sliver of ripe apricot"
      smallest_test: "Fold one sliver of apricot into one spoonful of finished mash; do not add fruit to the pot."
      success_condition: "Fruit acidity lightens the buttery sweetness without the spoonful reading as dessert."
      likely_failure: "Apricot sweetness stacks on the mash and the spoonful turns jammy."
      corrections: "Add salt or black pepper; use a firmer more sour apricot; halve the fruit amount."
      safety_note: "Use washed ripe fruit and fully cooked mash; this is a flavour test, not preservation guidance."

  - id: smoked_cream_for_plain_cream_in_soup
    known_pairing: "broccoli soup with yogurt"
    source_ingredient: yogurt
    substitute_ingredient: smoked_yogurt
    mechanism: aroma_bridge
    shared_function: "Both provide creamy acidity; smoke can bridge browned garnishes and a green soup base."
    meaningful_difference: "Smoke can dominate mild green flavours."
    expected_risk: "The soup may taste ashy or lose its fresh vegetable character."
    required_dimensions: "fermented_funky\nrich_fatty"
    explanation_template: "{candidate} is only plausible when {matched_dimensions} support the bridge: {shared_function}"
    confidence: low
    protocol:
      starting_ratio: "1 tablespoon soup : 1/8 teaspoon smoked yogurt"
      smallest_test: "Stir smoked yogurt into one spoonful away from the main pot."
      success_condition: "A faint smoke note adds depth without making the soup taste ashy."
      likely_failure: "Smoke dominates the green vegetable aroma."
      corrections: "Dilute with plain yogurt or soup; add fresh herbs; omit further smoke."
      safety_note: "Use refrigerated commercial yogurt and safely cooked soup; do not use this protocol for storage or fermentation."
