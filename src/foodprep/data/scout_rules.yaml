      likely_failure: "Fruit aroma dominates or makes the broccoli seem sweet."
      corrections: "Increase salt; dilute with plain vinegar; reduce the lingonberry vinegar to one drop."
      safety_note: "Use commercially prepared vinegar and fully cooked broccoli; this is a flavour test, not preservation guidance."

